<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 48" width="210" height="48">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- 아이콘 배경 (둥근 사각형) -->
  <rect x="0" y="2" width="44" height="44" rx="10" fill="url(#iconGrad)"/>

  <!-- 흰색 "가" 글자 -->
  <text x="22" y="33"
    text-anchor="middle"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
    font-size="25"
    font-weight="900"
    fill="white">가</text>

  <!-- 구분선 -->
  <rect x="54" y="10" width="1.5" height="28" rx="1" fill="#d1d5db"/>

  <!-- 회사명 -->
  <text x="64" y="26"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
    font-size="17"
    font-weight="800"
    fill="#1e293b"
    letter-spacing="-0.3">가람소프트</text>

  <!-- 부제 -->
  <text x="64" y="40"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#ec4899"
    letter-spacing="0.5">교육용 소프트웨어</text>
</svg>
